# Venice Forge — local theme overrides (example).
# Copy to .config/themes.local.yaml and edit freely.
# Path precedence: $VENICE_FORGE_THEMES_FILE > themes.local.yaml > themes.yaml (userData) > built-in defaults.
version: 1

themes:
  venice-parity-dark:
    display_name: "Venice Parity Dark"
    mode: "dark"
    tokens:
      accent: "#DD3300"
      background: "#050505"
      surface: "#101010"
      surface_elevated: "#181818"
      surface_muted: "#0b0b0b"
      border: "#2a2a2a"
      border_strong: "#777777"
      text_primary: "#ffffff"
      text_secondary: "#b7b7b7"
      text_muted: "#777777"
      foreground: "#ffffff"
      foreground_muted: "#b7b7b7"
      foreground_subtle: "#8a8a8a"
      accent_hover: "#FF4422"
      accent_foreground: "#ffffff"
      success: "#3fb950"
      success_foreground: "#050505"
      warning: "#d29922"
      warning_foreground: "#050505"
      danger: "#f85149"
      danger_foreground: "#050505"
      info: "#58a6ff"
      input_background: "#181818"
      input_foreground: "#ffffff"
      placeholder: "#8a8a8a"
      disabled_foreground: "#777777"
      button_primary_background: "#DD3300"
      button_primary_foreground: "#ffffff"
      button_secondary_background: "#181818"
      button_secondary_foreground: "#ffffff"
      link: "#58a6ff"
      focus_ring: "#FF4422"
      selection_background: "#DD3300"
      selection_foreground: "#ffffff"
      overlay: "rgba(0,0,0,0.6)"
      glow: "rgba(255,68,34,0.25)"

  graphite:
    display_name: "Graphite"
    mode: "dark"
    tokens:
      accent: "#9ca3af"
      background: "#09090b"
      surface: "#111113"
      surface_elevated: "#18181b"
