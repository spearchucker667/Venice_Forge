      text_primary: "#fafafa"
      text_secondary: "#d4d4d8"
      text_muted: "#71717a"
      foreground: "#fafafa"
      foreground_muted: "#d4d4d8"
      foreground_subtle: "#a1a1aa"
      accent_hover: "#d4d4d8"
      accent_foreground: "#0a0a0a"
      success: "#22c55e"
      success_foreground: "#09090b"
      warning: "#eab308"
      warning_foreground: "#09090b"
      danger: "#ef4444"
      danger_foreground: "#09090b"
      info: "#3b82f6"
      input_background: "#18181b"
      input_foreground: "#fafafa"
      placeholder: "#a1a1aa"
      disabled_foreground: "#71717a"
      button_primary_background: "#9ca3af"
      button_primary_foreground: "#0a0a0a"
      button_secondary_background: "#18181b"
      button_secondary_foreground: "#fafafa"
      link: "#60a5fa"
      focus_ring: "#a1a1aa"
      selection_background: "#9ca3af"
      selection_foreground: "#0a0a0a"
      overlay: "rgba(0,0,0,0.55)"
