  evidence: 'await desktopSync.setEmissionSuppressed({ suppressed: true });

    ...

    localEmissionSuppressed = suppressed;

    ...

    if (localEmissionSuppressed) return { ok: true };'
  problem: Manual import flips one process-global suppression flag, and every local mutation during that window receives a
    false success without being written to the durable outbox.
  root_cause: Echo prevention is implemented as global state rather than operation-scoped mutation provenance.
  impact: Concurrent user edits or background writes can remain local forever while the application reports successful sync
    emission.
