- id: T-001
  severity: high
  confidence: high
  category: data-integrity
  status: confirmed
  title: Electron and web backups use incompatible schema-v2 ciphertext encodings
  subsystem: encrypted-backup-format
  working_tree_context: tracked
  locations:
  - file: electron/services/backupCrypto.ts
    lines: 48-79
    symbol: encryptPayload/decryptPayload
  - file: src/services/backupExportService.ts
    lines: 84-97
    symbol: createEncryptedBackup
  - file: src/services/backupImportService.ts
    lines: 53-68
    symbol: decryptBackupPayload
  evidence: '// Electron

    const finalCiphertext = encrypted + ":" + authTag;

    ...

    const parts = ciphertextWithTag.split(":");

    if (parts.length !== 2) throw new Error("Invalid ciphertext format (missing auth tag)");


    // Web

    const ciphertextBuffer = await crypto.subtle.encrypt({ name: "AES-GCM", iv }, key, encodedPayload);

    ciphertext: toBase64(ciphertextBuffer)'
  problem: Both runtimes declare the same backup schema version, but Electron stores separate base64 ciphertext and tag joined
    by a colon while WebCrypto stores one combined ciphertext-plus-tag buffer.
  root_cause: The format version does not define a canonical algorithm envelope or authentication-tag encoding shared by both
    transports.
  impact: A backup exported in Electron cannot be imported in web mode, and a web backup cannot be imported in Electron, contradicting
    the portable “any device” product claim.
  remedy: Define a canonical versioned encryption envelope with explicit `algorithm`, `kdf`, `iterations`, `salt`, `iv`, `ciphertext`,
    and `authTag` fields, or a single specified binary layout. Bump the format version and add migration readers for both
    existing schema-v2 encodings. Add committed Electron-produced and WebCrypto-produced fixtures and test both import directions.
  regression_risk: high
  depends_on: []
  validation:
  - command: npx vitest run tests/backup/cross-runtime-backup.test.ts --fileParallelism=false
    expected: Electron and web fixtures decrypt in both runtimes and tampering is rejected
    observed: new-required
    evidence: 'Direct reproduction: Electron→web failed with InvalidCharacterError; web→Electron failed with missing authentication
      tag.'
  notes: Release blocker for encrypted portability.
