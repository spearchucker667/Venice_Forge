  evidence: "if (isElectron() && origin === \"remote-sync\") {\n  const result = await desktopSync.applyRemoteMutation({ storeName,\
    \ id, recordJson, remoteApplyToken });\n  if (!result.ok) throw new Error(result.error || \"Remote sync save was rejected.\"\
    );\n  return;\n}\n...\ndefault:\n  return { ok: false, error: \"Remote mutation store is not main-process managed.\" };"
  problem: Every authenticated remote mutation in Electron is routed to one main-process handler, but that handler supports
