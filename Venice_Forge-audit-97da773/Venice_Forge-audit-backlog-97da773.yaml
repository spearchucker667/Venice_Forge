    storage adapters. Route renderer-owned IndexedDB stores through a narrowly scoped, authenticated renderer apply path,
    or migrate those stores to main ownership. Acknowledge a packet only after the selected owner durably commits it. Add
    a parameterized integration test over every syncable store and fail if a store is allowlisted without an apply adapter.
  regression_risk: high
