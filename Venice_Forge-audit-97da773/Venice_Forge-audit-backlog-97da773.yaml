    lines: 595-614
    symbol: handleRemoteChange
  - file: electron/services/remoteApplyAuthority.ts
    lines: 22-33
    symbol: validateMutationAuthority
  - file: src/services/backupImportService.ts
    lines: 227-235
    symbol: importDecryptedPacket
  evidence: 'const remoteApplyToken = issueRemoteApplyGrant(parsed._operationId, parsed._storeName, parsed._id);

    ...

    return grant?.storeName === storeName && grant.recordId === recordId;

    ...

    await deleteStoreRecord(validation.tombstone.storeName, validation.tombstone.recordId, importOrigin, remoteApplyToken);'
  problem: A tombstone packet receives authority for `tombstones/<store>:<id>`, but importing it requests deletion of `<store>/<id>`,
    which fails the exact store-and-ID authority check.
  root_cause: The authorization grant models packet identity rather than the authorized target mutation produced by that packet.
  impact: Remote deletes for main-process-managed records are rejected, leaving deleted records present and vulnerable to
    later resurrection.
  remedy: 'Validate tombstones in the main process and issue a grant containing both packet identity and an explicit target
    mutation `{operationId, targetStore, targetId, operation: "delete", payloadHash}`. Consume the grant atomically when the
    target delete succeeds. Add an end-to-end test using the real watcher authority, import service, and storage adapter rather
    than mocks.'
