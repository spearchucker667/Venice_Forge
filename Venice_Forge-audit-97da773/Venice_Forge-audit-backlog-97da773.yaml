  notes: Release blocker for delete convergence.
- id: T-004
  severity: high
  confidence: high
  category: ipc
  status: confirmed
  title: Renderer can acknowledge a remote packet without proving durable application
  subsystem: remote-apply-acknowledgment
  working_tree_context: tracked
  locations:
  - file: electron/services/syncFolderWatcher.ts
    lines: 280-305
    symbol: acknowledgeOperation
  - file: electron/ipc/handlers/syncHandlers.ts
    lines: 137-145
    symbol: sync:acknowledgeOperation
  - file: electron/services/remoteApplyAuthority.ts
    lines: 4-33
    symbol: null
  evidence: "ipcMain.handle(\"sync:acknowledgeOperation\", async (_event, input) => {\n  return await acknowledgeOperation(input.operationId,\
    \ input.ok);\n});\n...\nif (ok) {\n  await recordAppliedOperation(operationId, inFlight.storeName, \"applied\", inFlight.sourceDeviceId);\n\
    \  await collectAcknowledgedEvent(...);\n}"
  problem: Any renderer that knows an in-flight operation ID can send a positive acknowledgment; the acknowledgment is not
    bound to the grant token, target mutation, payload hash, or a main-process commit result.
  root_cause: Packet delivery, privileged mutation, and acknowledgment are separate renderer-driven IPC calls rather than
    one main-authoritative transaction.
  impact: A compromised renderer or logic bug can mark unapplied data as applied and allow event collection, causing silent
    permanent data loss.
  remedy: Move apply-and-ack into one main-process transaction. Bind the grant to `{operationId, packetHash, targetStore,
    targetId, operation}`; consume it once after the main-owned or renderer-owned storage adapter returns durable success.
    Do not expose a standalone positive acknowledgment that can advance the journal without commit evidence.
  regression_risk: high
  depends_on: []
  validation:
  - command: npx vitest run tests/sync/remote-apply-transaction.test.ts --fileParallelism=false
    expected: an acknowledgment cannot be recorded unless the bound mutation durably succeeds
    observed: new-required
  notes: Conflicts with the roadmap claim of main-authoritative remote application.
