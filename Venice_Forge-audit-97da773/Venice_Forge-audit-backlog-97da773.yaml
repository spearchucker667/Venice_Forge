  evidence: "export function registerIpcChannel(channel, handler): void {\n  ipcMain.handle(channel, rateLimitIpcHandler(channel,\
    \ handler));\n}\n...\nipcMain.handle(\"sync:encryptBackup\", async (_event, params) => {\n  const encrypted = await encryptPayload(params.payload,\
    \ params.password);\n});"
  problem: The sync crypto handlers use raw `ipcMain.handle`, accept unbounded strings, and invoke an expensive PBKDF2/AES
    operation in the main process.
