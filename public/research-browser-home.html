<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'none'; style-src 'unsafe-inline'; img-src 'self' data:; font-src 'none'; script-src 'none'; connect-src 'none'; form-action 'none'; base-uri 'none';">
  <title>Venice Research Browser</title>
  <style>
    :root {
      color-scheme: light dark;
      --bg: #f7f8fb;
      --panel: #ffffff;
      --panel-border: #d7dce5;
      --text: #172033;
      --muted: #5d697d;
      --link: #0f766e;
      --link-bg: #e7f5f2;
      --link-border: #9fd4ca;
      --accent: #b42318;
      --shadow: 0 18px 60px rgba(15, 23, 42, 0.12);
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #101318;
        --panel: #171c24;
        --panel-border: #2d3542;
        --text: #eef2f7;
        --muted: #a9b3c2;
        --link: #5eead4;
        --link-bg: #12312d;
        --link-border: #1f6f64;
        --accent: #f97066;
        --shadow: 0 18px 60px rgba(0, 0, 0, 0.35);
      }
    }

    * {
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }

    main {
      width: min(720px, calc(100vw - 32px));
      padding: 34px;
      border: 1px solid var(--panel-border);
      border-radius: 12px;
      background: var(--panel);
      box-shadow: var(--shadow);
    }

    .eyebrow {
      margin: 0 0 10px;
      color: var(--accent);
      font-size: 0.78rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    h1 {
      margin: 0;
      font-size: clamp(1.8rem, 4vw, 2.6rem);
      line-height: 1.05;
      letter-spacing: 0;
    }

    p {
      max-width: 56ch;
      margin: 16px 0 0;
      color: var(--muted);
      font-size: 1rem;
      line-height: 1.55;
    }

    nav {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 12px;
      margin-top: 28px;
    }

    a {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 46px;
      padding: 10px 14px;
      border: 1px solid var(--link-border);
      border-radius: 8px;
      background: var(--link-bg);
      color: var(--link);
      font-weight: 700;
      text-decoration: none;
    }

    a:focus-visible {
      outline: 3px solid var(--link);
      outline-offset: 3px;
    }
  </style>
</head>
<body>
  <main>
    <p class="eyebrow">Local start page</p>
    <h1>Research Browser</h1>
    <p>Enter a URL or search query in the toolbar above, or start from one of these trusted research destinations.</p>
    <nav aria-label="Research Browser quick links">
      <a href="https://www.google.com/">Google</a>
      <a href="https://search.brave.com/">Brave Search</a>
      <a href="https://duckduckgo.com/">DuckDuckGo</a>
      <a href="https://venice.ai/">Venice.ai</a>
      <a href="https://jina.ai/">Jina.ai</a>
    </nav>
  </main>
</body>
</html>
