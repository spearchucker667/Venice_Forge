<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Research Browser</title>
<style>
  :root {
    --bg: #1a1b23;
    --fg: #c4c8d4;
    --fg-heading: #e0e2e8;
    --fg-muted: #8a8fa0;
    --fg-subtle: #5a5f70;
    --surface-raised: #2a2b36;
    --border: #3a3b48;
    --border-hover: #4a4b59;
    --link: #a0a5b4;
    --link-hover: #d0d4e0;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
  }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg);
    color: var(--fg);
    display: flex; align-items: center; justify-content: center;
    user-select: none;
  }
  .splash {
    text-align: center;
    max-width: min(420px, 90vw);
    padding: clamp(1rem, 5vw, 2rem);
    transition: transform 0.1s ease-out;
  }
  .splash svg {
    width: clamp(40px, 8vw, 64px);
    height: clamp(40px, 8vw, 64px);
    margin-bottom: clamp(0.75rem, 3vw, 1.5rem);
    opacity: 0.7;
  }
  .splash h1 {
    font-size: clamp(1rem, 3vw, 1.25rem);
    font-weight: 600;
    margin-bottom: clamp(0.25rem, 1.5vw, 0.5rem);
    color: var(--fg-heading);
  }
  .splash p {
    font-size: clamp(0.75rem, 2vw, 0.875rem);
    line-height: 1.5;
    color: var(--fg-muted);
    margin-bottom: clamp(0.75rem, 3vw, 1.5rem);
  }
  .splash .hint {
    font-size: clamp(0.7rem, 1.8vw, 0.8rem);
    color: var(--fg-subtle);
    line-height: 1.6;
  }
  .splash .hint kbd {
    background: var(--surface-raised);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 0.1em 0.5em;
    font-size: 0.85em;
    font-family: inherit;
  }
  .splash .quick-links {
    display: flex; flex-wrap: wrap; gap: clamp(0.25rem, 1.5vw, 0.5rem);
    justify-content: center;
    margin-top: clamp(0.5rem, 2vw, 1rem);
  }
  .splash .quick-link {
    background: var(--surface-raised);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: clamp(0.25rem, 1.5vw, 0.4rem) clamp(0.5rem, 2.5vw, 0.9rem);
    font-size: clamp(0.7rem, 1.8vw, 0.8rem);
    color: var(--link);
    text-decoration: none;
    transition: background 0.15s, border-color 0.15s, color 0.15s;
    cursor: pointer;
  }
  .splash .quick-link:hover {
    background: #353644;
    border-color: var(--border-hover);
    color: var(--link-hover);
  }
  .dim-indicator {
    position: fixed;
    bottom: 0.5rem;
    right: 0.5rem;
    font-size: 0.65rem;
    color: var(--fg-subtle);
    opacity: 0.5;
    font-family: monospace;
  }
</style>
</head>
<body>
<div class="splash">
  <svg fill="none" viewBox="0 0 24 24" stroke="currentColor">
    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M3.055 11H5a2 2 0 012 2v1a2 2 0 002 2 2 2 0 012 2v2.945M8 3.935V5.5A2.5 2.5 0 0010.5 8h.5a2 2 0 012 2 2 2 0 104 0 2 2 0 012-2h1.064M15 20.488V18a2 2 0 012-2h3.064M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
  </svg>
  <h1>Research Browser</h1>
  <p>Enter a URL or search term in the address bar above to start researching.</p>
  <div class="hint">
    <p>Type a URL or search term and press <kbd>Enter</kbd> to navigate</p>
    <p>Use the <kbd>Capture via Jina</kbd> button to extract page content</p>
  </div>
  <div class="quick-links">
    <a class="quick-link" href="https://en.wikipedia.org">Wikipedia</a>
    <a class="quick-link" href="https://news.ycombinator.com">Hacker News</a>
    <a class="quick-link" href="https://arxiv.org">arXiv</a>
    <a class="quick-link" href="https://github.com">GitHub</a>
  </div>
</div>
<div class="dim-indicator"></div>
<script>
  (function() {
    var dim = document.querySelector('.dim-indicator');
    function updateDim() {
      dim.textContent = window.innerWidth + '\u00d7' + window.innerHeight;
    }
    updateDim();
    window.addEventListener('resize', updateDim);
  })();
</script>
</body>
</html>
