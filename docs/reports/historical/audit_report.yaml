  final_gate:
    pass: false
    blockers:
      - "AUDIT-001: Dev session API keys live in unencrypted memory with no TTL — shared dev container risk."
      - "AUDIT-002: Web session API keys live in renderer module-level memory forever — XSS risk."
      - "AUDIT-003: dangerouslySetInnerHTML in markdown renderer without DOMPurify — XSS risk."
      - "AUDIT-004: timeoutMs = 0 bypasses the 60-second safety cap — infinite hang risk."
      - "AUDIT-005: Empty-string and prototype-pollution IDs silently corrupt IndexedDB — data integrity risk."
      - "AUDIT-007: Race condition in upsertDerivative loses children references — lineage corruption."
      - "AUDIT-014: as unknown as MediaItem cast propagates malformed data into encrypted store."
      - "AUDIT-015: navigator.clipboard.writeText without fallback breaks sandboxed Electron — UX failure."
      - "AUDIT-018: Gallery command handlers re-register on every filter keystroke — performance/race risk."
      - "AUDIT-019: VENICE_FORGE_CONFIG_FILE env override allows arbitrary file overwrite — filesystem integrity."
      - "AUDIT-022: Floating CI runner tags (ubuntu-latest) can silently break builds — release risk."
      - "AUDIT-023: Missing CI concurrency block causes parallel run races — resource/test flakiness risk."
