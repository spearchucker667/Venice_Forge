    - id: "AUDIT-004"
      severity: critical
      category: bug
      status: open
      file: "src/services/veniceClient.ts"
      line_range: "709, 503"
      evidence:
        - "const fetchTimeout = createTimeoutSignal(timeoutMs ?? 60000, signal);"
        - "timeoutMs = undefined as number | undefined. The ?? operator means timeoutMs = 0 results in createTimeoutSignal(0, signal), which immediately returns the parent signal with no timeout."
        - "A caller passing 0 (or a malicious 0) bypasses the 60-second safety cap entirely."
      impact: "Requests can hang indefinitely, causing resource exhaustion and poor UX. In streaming chat, this can leave a connection open for hours."
      required_fix: "Use Math.max(1000, timeoutMs ?? 60000) or reject timeoutMs <= 0 at the API boundary. Cap all Venice API calls at a minimum 1-second and maximum 120-second timeout."
      suggested_implementation:
        - "Change the timeout computation in veniceClient.ts to Math.max(1000, Math.min(timeoutMs ?? 60000, 120000))."
        - "Add a guard clause: if (typeof timeoutMs === 'number' && timeoutMs <= 0) timeoutMs = 60000;"
      verification:
        - "Write a unit test that passes timeoutMs: 0 to veniceStreamChat and asserts it rejects or uses the default 60-second timeout, not an infinite one."
      regression_risk: "low"
      depends_on: []

