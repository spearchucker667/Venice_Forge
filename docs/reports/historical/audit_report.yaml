        - "scripts/verify-model-aware-recipes.cjs"
        - "scripts/verify-media-studio-power-tools.cjs"
        - "scripts/verify-workflow-templates.cjs"
      required_tests:
        - "At minimum, each verifier should have a test that mocks the expected file tree and asserts pass/fail behavior."

    - area: "IPC handler rate limiting and resource exhaustion"
      files:
        - "electron/ipc/handlers.ts"
        - "electron/ipc/rpHandlers.ts"
        - "electron/ipc/configHandlers.ts"
      required_tests:
