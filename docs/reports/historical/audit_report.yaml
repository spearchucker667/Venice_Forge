    - area: "Config path env override security"
      files:
        - "electron/services/configService.ts"
      required_tests:
        - "Test that VENICE_FORGE_CONFIG_FILE=/etc/passwd is rejected by resolvePaths()."
        - "Test that writeSanitizedConfig refuses to write outside the userData/home directory tree."
        - "Test that VENICE_FORGE_THEMES_FILE with path traversal is rejected."

    - area: "Research Browser URL confirmation"
      files:
