  missing_coverage:
    - area: "Timeout and AbortSignal propagation"
      files:
        - "src/services/desktopBridge.ts"
        - "src/services/veniceClient.ts"
        - "src/utils/timeout.ts"
      required_tests:
        - "desktopBridge.ts fetch calls must reject within 10 s when the server is unresponsive."
        - "veniceClient.ts must reject timeoutMs = 0 and treat it as the default 60 s."
        - "createTimeoutSignal must not leak timers when the parent signal aborts before the timeout fires."

    - area: "ID validation and prototype pollution"
      files:
        - "src/services/storageService.ts"
        - "src/stores/project-store.ts"
        - "src/stores/chat-store.ts"
      required_tests:
        - "saveItem must reject id = '', id = '__proto__', and id = 'constructor'."
        - "deleteProject must not call deleteItem with a polluted id."
        - "markDirtyConversation must throw on empty-string ids."

    - area: "Encryption and data loss diagnostics"
      files:
        - "src/services/cryptoService.ts"
        - "src/services/storageService.ts"
      required_tests:
        - "decryptData must distinguish between 'corrupt data' and 'missing key' and surface the reason."
        - "decodeRows must not silently drop more than 10% of records without a visible error."

    - area: "Import safety and memory pressure"
      files:
        - "src/services/exportImport.ts"
      required_tests:
        - "Import of a 25 MiB JSON with 5,000 base64 images must be rejected or chunked."
        - "Import of malformed image strings (not data-URLs) must be rejected."

    - area: "Race conditions in media lineage"
      files:
        - "src/stores/media-store.ts"
      required_tests:
        - "Two concurrent upsertDerivative calls for the same parent must result in both children being present in childrenIds."

    - area: "Rate limiting and circuit breaker"
      files:
        - "server.ts"
      required_tests:
        - "The static rate limiter must not share a single bucket when req.ip is missing."
        - "The circuit breaker must enter half-open state and allow a single probe request."

    - area: "Clipboard fallback behavior"
      files:
        - "src/components/chat/message-bubble.tsx"
        - "src/components/scenes/SceneComposerView.tsx"
        - "src/components/prompts/PromptLibraryView.tsx"
      required_tests:
        - "Test that copy actions succeed when navigator.clipboard is available, and that the fallback fires when navigator.clipboard is undefined or throws."

    - area: "ErrorBoundary recovery"
      files:
        - "src/components/ErrorBoundary.tsx"
        - "src/components/ui/error-boundary.tsx"
      required_tests:
        - "Test that 'Try again' resets the boundary without window.location.reload(), and that the reload button is removed or replaced with a soft reset."

    - area: "Gallery handler registration stability"
      files:
        - "src/components/gallery/gallery-view.tsx"
      required_tests:
        - "Test that registerMediaCommandHandlers is called exactly once on mount, and not on every filter change."

    - area: "ThemeMaker hardcoded color validation"
      files:
        - "src/components/ThemeMaker.tsx"
      required_tests:
        - "Test that imported legacy themes always derive their success/warning/danger/info colors from the builtin token registry rather than literal hex strings."

    - area: "Build and packaging scripts lack unit tests"
      files:
        - "scripts/build-electron.cjs"
        - "scripts/start-production.cjs"
        - "scripts/create-cjs-package.cjs"
        - "scripts/generate-placeholder-icon.cjs"
        - "scripts/capture-release-qa-snapshots.mjs"
        - "scripts/init-config.ts"
        - "scripts/print-config.ts"
        - "scripts/validate-config.ts"
      required_tests:
        - "Verify that build scripts produce the expected output files, handle errors gracefully, and do not write to unexpected paths."

    - area: "Verify contract scripts lack unit tests"
      files:
        - "scripts/verify-bundle-budget.cjs"
        - "scripts/verify-image-policy.cjs"
        - "scripts/verify-no-native-dialogs.cjs"
        - "scripts/verify-work-orders.cjs"
        - "scripts/verify-web-contents-view.cjs"
        - "scripts/verify-venice-api-docs.cjs"
        - "scripts/verify-network-boundaries.cjs"
        - "scripts/verify-document-ingestion.cjs"
        - "scripts/verify-research-workspace.cjs"
        - "scripts/verify-research-browser.cjs"
        - "scripts/verify-rp-studio-polish.cjs"
