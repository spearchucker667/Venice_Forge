      status: open
      file: "src/stores/media-store.ts"
      line_range: "196-240"
      evidence:
        - "upsertDerivative reads the parent, appends the child id to childrenIds, then calls StorageService.patchMedia."
        - "Two concurrent derivatives for the same parent will both read the same old childrenIds, append their own id, and the second write will overwrite the first, losing the first child reference."
        - "This is a classic read-modify-write race condition on IndexedDB."
      impact: "Orphaned media records, broken lineage graphs, and missing parent-child relationships in the gallery."
      required_fix: "Use an atomic IndexedDB read-modify-write transaction, or add an optimistic-locking version field (version / etag) and retry on conflict."
      suggested_implementation:
        - "Add a version field to MediaItem and increment it on every patch."
        - "In upsertDerivative, read the current version, compute new childrenIds, and write only if version matches; retry on conflict."
      verification:
        - "Write a concurrency test that fires two upsertDerivative calls for the same parent simultaneously; verify both children appear in childrenIds after the fix."
      regression_risk: "medium"
      depends_on: []

