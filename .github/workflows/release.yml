name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-macos:
    runs-on: macos-14
    timeout-minutes: 90

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Use Node.js 22
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Audit dependencies (release gate)
        run: npm audit --audit-level=moderate
        # Moderate+ vulnerabilities fail the build for production and build-time dependencies.
        # High-only would be too permissive for a security-sensitive third-party client.

      - name: Verify generated icon
        run: npm run verify:icon

      - name: Verify release packaging hardening (VERIFY-052)
        run: npm run verify:release-packaging-hardening

      - name: Lint (zero warnings)
        run: npm run lint:eslint
        # Mirrors the CI workflow gate so a release cannot ship with an ESLint
        # warning that the regular PR pipeline would have caught.

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm run test:ci

      - name: Build
        run: npm run build

      - name: Check macOS signing credentials for tag releases
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          if [[ -z "${{ secrets.CSC_LINK }}" || -z "${{ secrets.CSC_KEY_PASSWORD }}" || -z "${{ secrets.APPLE_ID }}" || -z "${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}" || -z "${{ secrets.APPLE_TEAM_ID }}" ]]; then
            if [[ "${{ vars.RELEASE_ALLOW_UNSIGNED }}" != "true" ]]; then
              echo "::error::macOS tag releases fail closed without signing/notarization credentials. Set RELEASE_ALLOW_UNSIGNED=true only for a deliberate unsigned draft exception."
              exit 1
            fi
            echo "::warning::RELEASE_ALLOW_UNSIGNED=true: creating deliberately unsigned draft macOS artifacts."
          fi

      - name: Package macOS artifacts (Development)
        if: ${{ !startsWith(github.ref, 'refs/tags/v') }}
        run: npm run dist:mac
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"

      - name: Package macOS artifacts (Release)
        if: startsWith(github.ref, 'refs/tags/v')
        run: npm run dist:mac
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      - name: Generate SHA-256 checksums
        run: npm run checksum:release

      - name: Verify release artifacts
        run: npm run verify:dist:mac

      - name: Verify archive hygiene (no tracked contaminants)
        run: node scripts/verify-archive-clean.cjs

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: venice-forge-macos-${{ github.ref_name }}
          path: |
            release/*
          if-no-files-found: error

  build-windows:
    runs-on: windows-2022
    timeout-minutes: 90

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Use Node.js 22
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Audit dependencies (release gate)
        run: npm audit --audit-level=moderate
        # Moderate+ vulnerabilities fail the build for production and build-time dependencies.
        # High-only would be too permissive for a security-sensitive third-party client.

      - name: Verify generated icon
        run: npm run verify:icon

      - name: Verify release packaging hardening (VERIFY-052)
        run: npm run verify:release-packaging-hardening

      - name: Lint (zero warnings)
        run: npm run lint:eslint
        # Mirrors the CI workflow gate so a release cannot ship with an ESLint
        # warning that the regular PR pipeline would have caught.

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm run test:ci

      - name: Build
        run: npm run build

      - name: Check Windows signing credentials for tag releases
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          if [[ -z "${{ secrets.WIN_CSC_LINK }}" || -z "${{ secrets.WIN_CSC_KEY_PASSWORD }}" ]]; then
            if [[ "${{ vars.RELEASE_ALLOW_UNSIGNED }}" != "true" ]]; then
              echo "::error::Windows tag releases fail closed without signing credentials. Set RELEASE_ALLOW_UNSIGNED=true only for a deliberate unsigned draft exception."
              exit 1
            fi
            echo "::warning::RELEASE_ALLOW_UNSIGNED=true: creating deliberately unsigned draft Windows artifacts."
          fi

      - name: Package Windows artifacts (Development)
        if: ${{ !startsWith(github.ref, 'refs/tags/v') }}
        run: npm run dist:win
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"

      - name: Package Windows artifacts (Release)
        if: startsWith(github.ref, 'refs/tags/v')
        run: npm run dist:win
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
          WIN_CSC_LINK: ${{ secrets.WIN_CSC_LINK }}
          WIN_CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD }}

      - name: Generate SHA-256 checksums
        run: npm run checksum:release

      - name: Verify release artifacts
        run: npm run verify:dist:win

      - name: Verify portable artifact
        run: npm run verify:dist:portable

      - name: Verify archive hygiene (no tracked contaminants)
        run: node scripts/verify-archive-clean.cjs

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: venice-forge-windows-${{ github.ref_name }}
          path: |
            release/*
          if-no-files-found: error

  build-linux:
    runs-on: ubuntu-22.04
    timeout-minutes: 90

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Use Node.js 22
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Audit dependencies (release gate)
        run: npm audit --audit-level=moderate

      - name: Verify generated icon
        run: npm run verify:icon

      - name: Verify release packaging hardening (VERIFY-052)
        run: npm run verify:release-packaging-hardening

      - name: Lint (zero warnings)
        run: npm run lint:eslint
        # Mirrors the CI workflow gate so a release cannot ship with an ESLint
        # warning that the regular PR pipeline would have caught.

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm run test:ci

      - name: Build
        run: npm run build

      - name: Package Linux artifacts
        run: npm run dist:linux

      - name: Generate SHA-256 checksums
        run: npm run checksum:release

      - name: Verify Linux release artifacts
        run: npm run verify:dist:linux

      - name: Verify archive hygiene (no tracked contaminants)
        run: node scripts/verify-archive-clean.cjs

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: venice-forge-linux-${{ github.ref_name }}
          path: |
            release/*
          if-no-files-found: error

  publish:
    runs-on: ubuntu-22.04
    needs: [build-macos, build-windows, build-linux]
    if: startsWith(github.ref, 'refs/tags/v')
    timeout-minutes: 30
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Use Node.js 22
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Download macOS artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: venice-forge-macos-${{ github.ref_name }}
          path: release/

      - name: Download Windows artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: venice-forge-windows-${{ github.ref_name }}
          path: release/

      - name: Download Linux artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: venice-forge-linux-${{ github.ref_name }}
          path: release/

      - name: Verify all platform artifacts before publishing
        run: node scripts/verify-dist.cjs --all --release-artifacts-only

      - name: Publish to GitHub Releases
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3.0.2
        with:
          files: release/*
          # P1 hardening: create a draft release so a maintainer can review
          # artifacts, checksums, and signing/notarization status before
          # clicking "Publish release".
          draft: true
          prerelease: false
