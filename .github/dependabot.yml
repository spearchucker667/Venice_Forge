version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    groups:
      security-critical:
        patterns:
          - "vite"
          - "esbuild"
          - "electron"
          - "electron-builder"
          - "electron-updater"
          - "http-proxy-middleware"
          - "express"
          - "tar"
          - "form-data"
          - "js-yaml"
          - "yaml"
      production:
        dependency-type: production
        patterns:
          - "*"
      development:
        dependency-type: development
        patterns:
          - "*"
      major-updates:
        update-types:
          - "version-update:semver-major"
        patterns:
          - "*"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
